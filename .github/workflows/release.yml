# SPDX-License-Identifier: Apache-2.0
#
# Release
# =======
# One-click release pipeline triggered via workflow_dispatch.
# Validates pre-flight conditions (semver format, tag
# uniqueness, CI status, unreleased commits), creates the
# tag, builds cross-platform binaries via GoReleaser with
# SBOM and Cosign signing, signs macOS archives with Apple
# Developer ID, notarizes them, and publishes to the
# Homebrew tap.

name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v0.15.0)'
        required: true
        type: string

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      checks: read
    timeout-minutes: 10
    env:
      RELEASE_TAG: ${{ inputs.tag }}
    outputs:
      has_signing_secrets: ${{ steps.check-secrets.outputs.has_secrets }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - name: Validate tag format
        run: |
          if ! echo "$RELEASE_TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid tag format: '$RELEASE_TAG'. Must match vMAJOR.MINOR.PATCH (e.g., v0.15.0)."
            exit 1
          fi
          echo "Tag format valid: $RELEASE_TAG"

      - name: Check tag uniqueness
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/${RELEASE_TAG}$"; then
            echo "::error::Tag '$RELEASE_TAG' already exists. Choose a different version."
            exit 1
          fi
          echo "Tag '$RELEASE_TAG' does not exist yet."

      - name: Verify semver ordering
        run: |
          LATEST=$(git tag -l 'v[0-9]*' --sort=-v:refname | head -1)
          if [ -z "$LATEST" ]; then
            echo "No existing tags found. First release."
            exit 0
          fi
          echo "Latest existing tag: $LATEST"
          # Compare using sort -V: if TAG sorts after LATEST, it is greater
          HIGHER=$(printf '%s\n%s' "$LATEST" "$RELEASE_TAG" | sort -V | tail -1)
          if [ "$HIGHER" = "$LATEST" ]; then
            echo "::error::Tag '$RELEASE_TAG' is not greater than latest release '$LATEST'."
            exit 1
          fi
          echo "Version ordering valid: $RELEASE_TAG > $LATEST"

      - name: Verify CI passed on HEAD
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          HEAD_SHA=$(git rev-parse HEAD)
          echo "Checking CI status for commit $HEAD_SHA"

          REQUIRED_CHECKS=(
            "Build and Test"
            "Standardized CI / Run linters"
          )

          for CHECK_NAME in "${REQUIRED_CHECKS[@]}"; do
            STATUS=$(gh api "repos/${GH_REPO}/commits/${HEAD_SHA}/check-runs" \
              --jq ".check_runs[] | select(.name == \"${CHECK_NAME}\") | .conclusion" \
              2>/dev/null | head -1)
            if [ "$STATUS" != "success" ]; then
              echo "::error::Required check '${CHECK_NAME}' has not passed (status: ${STATUS:-not found}). Push to main and wait for CI before releasing."
              exit 1
            fi
            echo "  ✓ ${CHECK_NAME}: success"
          done

          # Security checks: verify at least one scan passed
          SECURITY_PASSED=false
          for CHECK_NAME in "OSV-Scanner / Trivy Source Scan" "OSV-Scanner / OSV-Scanner / osv-scan"; do
            STATUS=$(gh api "repos/${GH_REPO}/commits/${HEAD_SHA}/check-runs" \
              --jq ".check_runs[] | select(.name == \"${CHECK_NAME}\") | .conclusion" \
              2>/dev/null | head -1)
            if [ "$STATUS" = "success" ]; then
              echo "  ✓ ${CHECK_NAME}: success"
              SECURITY_PASSED=true
            else
              echo "  ⚠ ${CHECK_NAME}: ${STATUS:-not found}"
            fi
          done

          if [ "$SECURITY_PASSED" != "true" ]; then
            echo "::error::No security scan checks have passed on HEAD. Push to main and wait for CI before releasing."
            exit 1
          fi

          echo "All required CI checks passed."

      - name: Verify unreleased commits
        run: |
          LATEST=$(git tag -l 'v[0-9]*' --sort=-v:refname | head -1)
          if [ -z "$LATEST" ]; then
            COUNT=$(git rev-list --count HEAD)
          else
            COUNT=$(git rev-list --count "${LATEST}..HEAD")
          fi
          if [ "$COUNT" -eq 0 ]; then
            echo "::error::No unreleased commits since ${LATEST:-initial commit}. Nothing to release."
            exit 1
          fi
          echo "$COUNT commit(s) since ${LATEST:-initial commit}."

      - name: Create and push tag
        run: |
          # Skip if tag was already created (e.g., re-run after
          # partial failure or manual tag via GitHub API).
          if git ls-remote --tags origin | grep -q "refs/tags/${RELEASE_TAG}$"; then
            echo "Tag $RELEASE_TAG already exists, skipping creation."
            exit 0
          fi
          # Annotated tags require a committer identity on the
          # CI runner (git tag -a uses GIT_COMMITTER_NAME/EMAIL).
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$RELEASE_TAG" -m "$RELEASE_TAG"
          git push origin "$RELEASE_TAG"
          echo "Created and pushed tag: $RELEASE_TAG"

      - name: Check signing secrets
        id: check-secrets
        run: |
          if [ -n "$MACOS_SIGN_P12" ]; then
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}

  release:
    runs-on: ubuntu-latest
    needs: preflight
    permissions:
      contents: write
      id-token: write
    timeout-minutes: 45
    env:
      RELEASE_TAG: ${{ inputs.tag }}
    outputs:
      has_signing_secrets: ${{ needs.preflight.outputs.has_signing_secrets }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version-file: go.mod

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94  # v7.2.3
        with:
          distribution: goreleaser
          version: 'v2.14.1'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ inputs.tag }}

      - name: Upload generated cask and formula as release artifacts
        # GoReleaser writes dist/homebrew/Casks/unbound-force.rb and
        # dist/homebrew/Formula/unbound-force.rb with skip_upload: true.
        # Upload both so the sign-macos job can download and patch darwin checksums.
        run: |
          gh release upload "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            dist/homebrew/Casks/unbound-force.rb \
            --clobber

          # Rename formula to avoid filename collision with cask (both are unbound-force.rb)
          cp dist/homebrew/Formula/unbound-force.rb dist/homebrew/Formula/unbound-force-formula.rb
          gh release upload "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            dist/homebrew/Formula/unbound-force-formula.rb \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sign-macos:
    runs-on: macos-latest
    needs: release
    if: ${{ needs.release.outputs.has_signing_secrets == 'true' }}
    permissions:
      contents: write
    timeout-minutes: 30
    env:
      RELEASE_TAG: ${{ inputs.tag }}
    steps:
      - name: Import certificate into Keychain
        run: |
          set -euo pipefail
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          echo -n "$MACOS_SIGN_P12" | base64 --decode -o "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/cert.p12" -P "$MACOS_SIGN_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
        env:
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}

      - name: Prepare notary key
        run: |
          set -euo pipefail
          echo -n "$MACOS_NOTARY_KEY" | base64 --decode -o "$RUNNER_TEMP/notary_key.p8"
        env:
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}

      - name: Download darwin archives
        run: |
          set -euo pipefail
          gh release download "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --pattern "unbound-force_*_darwin_*.tar.gz" --dir ./artifacts

          # Verify both expected archives were downloaded
          VERSION="${RELEASE_TAG#v}"
          for arch in amd64 arm64; do
            if [ ! -f "./artifacts/unbound-force_${VERSION}_darwin_${arch}.tar.gz" ]; then
              echo "::error::Expected darwin_${arch} archive not found after download"
              exit 1
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign and notarize
        run: |
          set -euo pipefail
          mkdir -p ./signed
          for archive in ./artifacts/unbound-force_*_darwin_*.tar.gz; do
            echo "==> Processing $(basename "$archive")"
            workdir=$(mktemp -d)

            # Extract binary
            tar -xzf "$archive" -C "$workdir"

            # Sign with codesign
            codesign --force --timestamp --options runtime \
              --sign "$MACOS_SIGN_IDENTITY" \
              "$workdir/unbound-force"

            # Verify signature
            codesign --verify --verbose=2 "$workdir/unbound-force"

            # Zip for notarytool (requires .zip, not .tar.gz)
            ditto -c -k "$workdir/unbound-force" "$workdir/unbound-force.zip"

            # Submit for notarization and wait
            xcrun notarytool submit "$workdir/unbound-force.zip" \
              --key "$RUNNER_TEMP/notary_key.p8" \
              --key-id "$MACOS_NOTARY_KEY_ID" \
              --issuer "$MACOS_NOTARY_ISSUER_ID" \
              --wait --timeout 20m

            # Re-archive signed binary with original archive name
            tar -czf "./signed/$(basename "$archive")" -C "$workdir" unbound-force

            rm -rf "$workdir"
            echo "==> Done: $(basename "$archive")"
          done
        env:
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}

      - name: Replace release assets and update checksums
        run: |
          set -euo pipefail
          # Upload signed darwin archives (replaces unsigned)
          gh release upload "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" ./signed/*.tar.gz --clobber

          # Download existing checksums
          gh release download "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --pattern "checksums.txt" --dir ./

          # Remove darwin lines from checksums (keep linux and other lines)
          grep -v darwin checksums.txt > checksums_updated.txt || true

          # Compute SHA256 for each signed darwin archive
          for archive in ./signed/*.tar.gz; do
            shasum -a 256 "$archive" | sed 's|./signed/||' >> checksums_updated.txt
          done

          # Replace checksums file
          mv checksums_updated.txt checksums.txt
          gh release upload "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" checksums.txt --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew cask and formula
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"

          # Verify signed archives exist before computing checksums
          for arch in arm64 amd64; do
            if [ ! -f "./signed/unbound-force_${VERSION}_darwin_${arch}.tar.gz" ]; then
              echo "::error::Signed darwin_${arch} archive not found"
              exit 1
            fi
          done

          # Compute signed checksums
          ARM64_SHA=$(shasum -a 256 "./signed/unbound-force_${VERSION}_darwin_arm64.tar.gz" | awk '{print $1}')
          AMD64_SHA=$(shasum -a 256 "./signed/unbound-force_${VERSION}_darwin_amd64.tar.gz" | awk '{print $1}')

          echo "darwin_arm64 SHA256: $ARM64_SHA"
          echo "darwin_amd64 SHA256: $AMD64_SHA"

          # Download the GoReleaser-generated cask and formula (uploaded by the release job)
          gh release download "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --pattern "unbound-force.rb" --dir ./cask-staging
          gh release download "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --pattern "unbound-force-formula.rb" --dir ./formula-staging

          CASK_FILE="./cask-staging/unbound-force.rb"
          FORMULA_FILE="./formula-staging/unbound-force-formula.rb"

          # Patch darwin checksums with signed values (shared function for DRY)
          patch_checksums() {
            local input="$1" output="${1}.patched"
            awk -v amd64="$AMD64_SHA" -v arm64="$ARM64_SHA" '
              /darwin_amd64/ { found_amd64=1 }
              /darwin_arm64/ { found_arm64=1 }
              /sha256/ && found_amd64 {
                sub(/sha256 "[^"]*"/, "sha256 \"" amd64 "\"")
                found_amd64=0
              }
              /sha256/ && found_arm64 {
                sub(/sha256 "[^"]*"/, "sha256 \"" arm64 "\"")
                found_arm64=0
              }
              { print }
            ' "$input" > "$output"
            mv "$output" "$input"
          }

          patch_checksums "$CASK_FILE"
          patch_checksums "$FORMULA_FILE"

          # Push both cask and formula to the Homebrew tap
          git clone "https://x-access-token:${HOMEBREW_TAP_GITHUB_TOKEN}@github.com/unbound-force/homebrew-tap.git" tap
          cp "$CASK_FILE" tap/Casks/unbound-force.rb
          mkdir -p tap/Formula
          cp "$FORMULA_FILE" tap/Formula/unbound-force.rb

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/unbound-force.rb Formula/unbound-force.rb
          git diff --cached --quiet && { echo "No tap changes needed"; exit 0; }
          git commit -m "feat: update unbound-force cask and formula to ${RELEASE_TAG} (signed)"
          git push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
