#
# Local CI
# ========
# Project-specific checks that cannot be delegated to
# org-infra reusable workflows: build, test with race
# detection, and coverage ratchet enforcement.

name: Local CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: auto
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: 'go.mod'

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Enforce Coverage Ratchets
        run: |
          # Calculate global coverage
          GLOBAL_COV=$(go tool cover -func=coverage.out | grep total: | awk '{print substr($3, 1, length($3)-1)}')
          echo "Global coverage: $GLOBAL_COV%"
          if (( $(echo "$GLOBAL_COV < 80.0" | bc -l) )); then
            echo "Error: Global coverage $GLOBAL_COV% is below the 80% threshold."
            exit 1
          fi

          # Calculate internal/backlog coverage
          BACKLOG_COV=$(go tool cover -func=coverage.out | grep github.com/unbound-force/unbound-force/internal/backlog | awk '{print substr($3, 1, length($3)-1)}' | awk '{total += $1; count++} END {if (count > 0) print total/count; else print 0}')
          echo "Backlog coverage: $BACKLOG_COV%"
          if (( $(echo "$BACKLOG_COV < 90.0" | bc -l) )); then
            echo "Error: internal/backlog coverage $BACKLOG_COV% is below the 90% threshold."
            exit 1
          fi
