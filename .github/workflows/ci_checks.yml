#
# CI Checks
# =========
# Runs MegaLinter (Go, Actions, Bash, Gitleaks) and
# validates PR titles against conventional commit format.
# Consumes the reusable CI workflow from org-infra.

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  issues: none
  pull-requests: none

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  call_reusable_ci:
    name: Standardized CI
    uses: complytime/org-infra/.github/workflows/reusable_ci.yml@638b2037394ca0f0b860a135c7c27dce75fd3c03 # v0.5.0
    permissions:
      contents: read
      issues: read
      pull-requests: read
